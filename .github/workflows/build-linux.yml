name: Build Linux (portable mpv + vf_animejanai)

# Builds a portable Linux mpv bundle (mpv + libmpv.so.2 with the vf_animejanai
# filter, plus its shared-lib deps) on the Ubuntu 22.04 baseline image and
# publishes it as a release asset. The mpv-upscale-2x_animejanai assembler
# downloads this (InstallLinuxMpv) - the Linux analogue of the mpv-winbuild
# release for Windows. The filter lives on master (aji ABI v7).
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (matches MpvForkLinuxVersion in the assembler)'
        required: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/the-database/animejanai-linux-build:ubuntu2204
    permissions:
      contents: write
    steps:
    - name: Checkout (master carries vf_animejanai)
      uses: actions/checkout@v4
      with:
        ref: master

    - name: Build portable mpv bundle
      run: |
        chmod +x ci/build-linux-portable.sh
        MPV_SRC="$PWD" ci/build-linux-portable.sh "${{ github.event.inputs.release_tag }}" "$PWD/out"

    - name: Publish release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.event.inputs.release_tag }}
        name: ${{ github.event.inputs.release_tag }}
        draft: false
        prerelease: false
        allowUpdates: true
        artifacts: "out/mpv-linux-x64-${{ github.event.inputs.release_tag }}.tar.zst"
        token: ${{ secrets.GITHUB_TOKEN }}
